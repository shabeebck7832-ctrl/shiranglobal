<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shiran Global | Premium Export Company</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* Container */
.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* Header */
header {
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: #d4af37;
    text-decoration: none;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav ul li a {
    color: #ccc;
    text-decoration: none;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #d4af37;
}

/* Button */
.btn {
    padding: 10px 20px;
    background: #d4af37;
    color: #000;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 500;
}

/* Hero Section */
.hero {
    height: 90vh;
    display: flex;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    margin-bottom: 20px;
}

.hero p {
    color: #aaa;
    margin-bottom: 30px;
}
</style>

</head>

<body>

<header>
<div class="container">
<nav>

<a href="#" class="logo">Shiran Global</a>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Products</a></li>
<li><a href="#">Contact</a></li>
</ul>

<a href="#" class="btn">Request Quote</a>

</nav>
</div>
</header>

<section class="hero">
<div class="container">

<h1>Exporting Kerala’s Finest To The World</h1>
<p>Premium Coconut Products, Spices, Fruits & Vegetables</p>

<a href="#" class="btn">Explore Products</a>

</div>
</section>

</body>
</html>
